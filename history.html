<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History</title>
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="history.css" />
</head>
<body>
  <div class="layout">
    <main class="main">
      <section class="content">
        <div class="page-title-row">
          <div class="title-left">
            <div class="title-icon" data-ico="history"></div>
            <div>
              <h1>History</h1>
              <p>Review approved and declined reservation records.</p>
            </div>
          </div>
          <input
            id="search"
            class="search"
            placeholder="Search history..."
          />
        </div>

        <p class="history-note">
          This page automatically updates after approving or declining requests.
        </p>

        <div class="card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>REQUEST ID</th>
                  <th>REQUESTER</th>
                  <th>VENUE</th>
                  <th>DATE</th>
                  <th>TIME</th>
                  <th>FINAL STATUS</th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
        </div>
      </section>

      <footer class="footer">
        © 2026 National University Manila<br />
        Physical Facilities Management Office
      </footer>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    initShell("history");

    function render() {
      let q = search.value.toLowerCase();
      rows.innerHTML = getData()
        .filter((x) => x[6] !== "pending" && x.join(" ").toLowerCase().includes(q))
        .map(
          (x) =>
            `<tr><td>${x[0]}</td><td><b>${x[1]}</b><br><span class="subtext">${x[2]}</span></td><td>${x[3]}</td><td>${x[4]}</td><td>${x[5]}</td><td>${badge(
              x[6]
            )}</td></tr>`
        )
        .join("");
    }

    search.oninput = render;
    render();
  </script>
</body>
</html>
