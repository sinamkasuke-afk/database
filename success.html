<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservation Submitted</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="success.css">
</head>
<body>

<div class="success-container">

  <div class="success-card">

    <!-- ICON -->
    <div class="check-icon">✓</div>

    <!-- TITLE -->
    <h1>Reservation Submitted Successfully</h1>

    <!-- MESSAGE -->
    <p class="subtext">
      Your request has been submitted and is now pending approval from the
      Physical Facilities Management Office.
    </p>

    <!-- SUMMARY -->
    <div class="summary-box">
      <h3>Reservation Summary</h3>

      <div class="summary-row">
        <span>Venue</span>
        <strong>Amphitheater</strong>
      </div>

      <div class="summary-row">
        <span>Date</span>
        <strong>April 6, 2026</strong>
      </div>

      <div class="summary-row">
        <span>Time</span>
        <strong>7:00 AM - 10:00 AM</strong>
      </div>
    </div>

    <!-- BUTTONS -->
    <div class="actions">
      <a href="new-reservation.html" class="btn secondary">New Reservation</a>
      <a href="login.html" class="btn primary">Back to Portal</a>
    </div>

  </div>

</div>

</body>
</html>
