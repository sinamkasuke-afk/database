<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

/* BODY */
body{
  display:flex;
  height:100vh;
  background:#f4f6fb;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:#0a2a66;
  color:white;
  padding:20px;
  position:relative;
}

.sidebar h2{
  margin-bottom:30px;
}

.sidebar a{
  display:block;
  padding:12px;
  margin:10px 0;
  color:white;
  text-decoration:none;
  border-radius:8px;
}

.sidebar a.logout{
  background:#f4b400;
  color:black;
}

/* GOLD CURVE */
.sidebar::after{
  content:'';
  position:absolute;
  right:-40px;
  top:0;
  width:80px;
  height:100%;
  background:#f4b400;
  border-radius:50px;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* MODAL */
.logout-box{
  background:white;
  padding:30px;
  border-radius:12px;
  text-align:center;
  width:350px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.logout-icon{
  font-size:40px;
  margin-bottom:10px;
  color:#0a2a66;
}

.logout-box h2{
  margin-bottom:10px;
}

.logout-box p{
  margin-bottom:20px;
  color:#555;
}

/* BUTTONS */
.buttons{
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  padding:10px 20px;
  border-radius:8px;
  text-decoration:none;
  font-weight:600;
}

.cancel{
  border:1px solid #ccc;
  color:#333;
}

.logout{
  background:#0a2a66;
  color:white;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>NU Manila</h2>

  <a href="#">Dashboard</a>
  <a href="#">Reservation Requests</a>
  <a href="#" class="logout">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- LOGOUT MODAL -->
  <div class="logout-box">

    <div class="logout-icon">↪</div>

    <h2>Confirm Logout</h2>
    <p>Are you sure you want to logout from your account?</p>

    <div class="buttons">
      <a href="admin-dashboard.html" class="btn cancel">Cancel</a>
      <a href="login.html" class="btn logout">Logout</a>
    </div>

  </div>

</div>

</body>
</html>
