<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logout</title>

  <link rel="stylesheet" href="base.css" />

  <style>

    .logout-wrap{
      min-height:calc(100vh - 105px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px;
    }

    .logout-box{
      width:380px;
      background:white;
      border:1px solid #edf0f5;
      border-radius:14px;
      box-shadow:0 10px 30px rgba(0,0,0,0.12);
      text-align:center;
      padding:34px 28px;
    }

    .logout-icon{
      width:56px;
      height:56px;
      border-radius:50%;
      background:#eef4ff;
      color:#06285f;
      display:grid;
      place-items:center;
      margin:0 auto 18px;
      font-size:28px;
      font-weight:bold;
    }

    .logout-box h1{
      color:#06285f;
      font-size:24px;
      margin-bottom:10px;
    }

    .logout-box p{
      color:#53617c;
      font-size:15px;
      line-height:1.5;
      margin-bottom:24px;
    }

    .logout-actions{
      display:flex;
      justify-content:center;
      gap:12px;
    }

    .logout-actions a{
      text-decoration:none;
      padding:11px 22px;
      border-radius:8px;
      font-weight:700;
      font-size:14px;
    }

    .cancel-btn{
      border:1px solid #dfe5ef;
      color:#06285f;
      background:white;
    }

    .logout-btn{
      background:#06285f;
      color:white;
    }

  </style>

</head>

<body>

  <div class="layout">

    <main class="main">

      <section class="logout-wrap">

        <div class="logout-box">

          <div class="logout-icon">↪</div>

          <h1>Confirm Logout</h1>

          <p>
            Are you sure you want to logout from your admin account?
          </p>

          <div class="logout-actions">

            <a href="dashboard.php" class="cancel-btn">
              Cancel
            </a>

            <a href="login.html" class="logout-btn">
              Logout
            </a>

          </div>

        </div>

      </section>

      <footer class="footer">
        © 2026 National University Manila<br>
        Physical Facilities Management Office
      </footer>

    </main>

  </div>

  <script src="app.js"></script>

  <script>
    initShell("logout");
  </script>

</body>
</html>
