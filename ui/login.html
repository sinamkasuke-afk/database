<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Facilities Reservation System</title>

  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="login.css">
</head>

<body>

  <main class="login-page">

    <section class="left-side">

      <div class="left-inner">

        <img
          src="nu-logo.png"
          alt="NU Logo"
          class="nu-logo"
        >

        <p class="school-name">
          NATIONAL UNIVERSITY MANILA
        </p>

        <h1>
          Facilities<br>
          Reservation<br>
          System
        </h1>

        <p class="portal-text">
          Physical Facilities Management Office<br>
          Official Portal
        </p>

        <div class="support-box">

          <span class="support-line"></span>

          <p>
            For assistance, contact the Physical Facilities Management Office.
          </p>

        </div>

      </div>

      <div class="mascot-watermark"></div>

    </section>

    <section class="right-side">

      <div class="gold-curve"></div>

      <div class="form-card">

        <div class="tabs">
          <button class="tab active" type="button">
            Login
          </button>
        </div>

        <div class="form-head">

          <h2>
            Welcome Back!
          </h2>

          <p>
            Login to continue to your account
          </p>

        </div>

        <!-- LOGIN FORM -->
        <form class="login-form" id="loginForm">

          <label for="userType">
            User Type
          </label>

          <div class="input-wrap">

            <select
              id="userType"
              name="role"
              required
            >
              <option selected disabled value="">
                Select user type
              </option>

              <option value="student">
                Student
              </option>

              <option value="employee">
                Employee
              </option>

            </select>

          </div>

          <label for="email">
            Email Address
          </label>

          <div class="input-wrap">

            <input
              id="email"
              name="email"
              type="email"
              placeholder="Enter your email"
              required
            >

          </div>

          <label for="password">
            Password
          </label>

          <div class="input-wrap">

            <input
              id="password"
              name="password"
              type="password"
              placeholder="Enter your password"
              required
            >

            <button
              class="eye-btn"
              type="button"
              onclick="togglePassword()"
            >
              👁
            </button>

          </div>

          <a href="#" class="forgot-link">
            Forgot password?
          </a>

          <button class="login-btn" type="submit">
            Login
          </button>

          <div class="divider">
            <span>or</span>
          </div>

          <a href="index.html" class="return-btn">
            ← Return to Main Portal
          </a>

        </form>

      </div>

    </section>

  </main>

  <script>

    function togglePassword() {

      const password =
        document.getElementById("password");

      password.type =
        password.type === "password"
        ? "text"
        : "password";
    }

    document
      .getElementById("loginForm")
      .addEventListener("submit", async function(e) {

      e.preventDefault();

      const role =
        document.getElementById("userType").value;

      const email =
        document.getElementById("email").value;

      const password =
        document.getElementById("password").value;

      const formData = new FormData();

      formData.append("role", role);
      formData.append("email", email);
      formData.append("password", password);

      const response = await fetch(
        "api/login.php",
        {
          method: "POST",
          body: formData
        }
      );

      const data = await response.json();

      if (data.success) {

        localStorage.setItem(
          "loggedInEmail",
          data.user.email
        );

        localStorage.setItem(
          "loggedInName",
          data.user.full_name
        );

        localStorage.setItem(
          "loggedInRole",
          data.user.role
        );

        window.location.href =
          "new-reservation.html";

      } else {

        alert(data.message);

      }

    });

  </script>

</body>
</html>
