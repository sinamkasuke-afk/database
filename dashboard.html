<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div class="layout">
    <main class="main">
      <section class="content">
        <div class="page-title-row">
          <div class="title-left">
            <div class="title-icon" data-ico="dashboard"></div>
            <div>
              <h1>Dashboard</h1>
              <p>Overview of all facility reservation requests.</p>
            </div>
          </div>
          <input
            id="search"
            class="search"
            placeholder="Search request ID, requester, or status..."
          />
        </div>

        <div class="stats">
          <div class="stat-card">
            <p>Total Requests</p>
            <h2 id="total">0</h2>
          </div>
          <div class="stat-card">
            <p>Pending</p>
            <h2 id="pending">0</h2>
          </div>
          <div class="stat-card">
            <p>Approved</p>
            <h2 id="approved">0</h2>
          </div>
          <div class="stat-card">
            <p>Declined</p>
            <h2 id="declined">0</h2>
          </div>
        </div>

        <div class="dashboard-grid">
          <div class="card">
            <h3 class="mini-title">Recent Reservation Requests</h3>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>REQUEST ID</th>
                    <th>REQUESTER</th>
                    <th>VENUE</th>
                    <th>STATUS</th>
                  </tr>
                </thead>
                <tbody id="rows"></tbody>
              </table>
            </div>
          </div>

          <div class="card">
            <h3 class="mini-title">Status Summary</h3>
            <div class="status-list">
              <div>
                <span>Pending</span>
                <span id="sumPending">0</span>
              </div>
              <div>
                <span>Approved</span>
                <span id="sumApproved">0</span>
              </div>
              <div>
                <span>Declined</span>
                <span id="sumDeclined">0</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <footer class="footer">
        © 2026 National University Manila<br />
        Physical Facilities Management Office
      </footer>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    initShell("dashboard");

    function render() {
      let c = counts();
      total.textContent = c.total;
      pending.textContent = c.pending;
      approved.textContent = c.approved;
      declined.textContent = c.declined;
      sumPending.textContent = c.pending;
      sumApproved.textContent = c.approved;
      sumDeclined.textContent = c.declined;

      let q = search.value.toLowerCase();
      rows.innerHTML = getData()
        .filter((x) => x.join(" ").toLowerCase().includes(q))
        .slice(0, 7)
        .map(
          (x) =>
            `<tr><td>${x[0]}</td><td><b>${x[1]}</b><br><span class="subtext">${x[2]}</span></td><td>${x[3]}</td><td>${badge(
              x[6]
            )}</td></tr>`
        )
        .join("");
    }

    search.oninput = render;
    render();
  </script>
</body>
</html>
